<!DOCTYPE html>
<html>
<head>
    <title>Frames Example - Maps & External Pages</title>
</head>

<body>

    <h2 align="center">HTML Frames (iFrame) Demo</h2>

    <!-- Frame for Google Map -->
    <h3>Embedded Map</h3>
    <iframe 
        src="https://www.google.com/maps?q=Nagpur&output=embed"
        width="600" 
        height="300" 
        style="border:1px solid black;">
    </iframe>

    <br><br>

    <!-- Frame for External Website -->
    <h3>External Webpage</h3>
    <iframe 
        src="https://www.wikipedia.org"
        width="600" 
        height="300" 
        style="border:1px solid black;">
    </iframe>

</body>
</html>
