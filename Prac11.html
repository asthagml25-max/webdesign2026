<!DOCTYPE html>

<html>
<head>
    <title>HTML5 Geolocation Demo</title>
</head>

<body>

<h2>HTML5 APIs Demo</h2>

<!-- Geolocation -->

<h3>Geolocation</h3>
<button onclick="getLocation()">Get Location</button>
<p id="loc"></p>

<!-- Drag and Drop -->

<h3>Drag and Drop</h3>
<div id="box" draggable="true" ondragstart="drag(event)"
     style="width:100px;height:100px;background:orange;">
    Drag
</div>

<div ondrop="drop(event)" ondragover="allowDrop(event)"
     style="width:200px;height:150px;border:2px solid black;">
    Drop Here
</div>

<!-- Web Storage -->

<h3>Web Storage</h3>
<input type="text" id="name" placeholder="Enter name">
<button onclick="save()">Save</button>
<button onclick="load()">Load</button>
<p id="result"></p>

<script>
// Geolocation
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            document.getElementById("loc").innerHTML =
                "Latitude: " + pos.coords.latitude +
                "<br>Longitude: " + pos.coords.longitude;
        });
    } else {
        document.getElementById("loc").innerHTML = "Not supported";
    }
}

// Drag & Drop
function allowDrop(e) { e.preventDefault(); }
function drag(e) { e.dataTransfer.setData("text", e.target.id); }
function drop(e) {
    e.preventDefault();
    var data = e.dataTransfer.getData("text");
    e.target.appendChild(document.getElementById(data));
}

// Web Storage
function save() {
    localStorage.setItem("name", document.getElementById("name").value);
}

function load() {
    document.getElementById("result").innerHTML =
        localStorage.getItem("name");
}
</script>

</body>
</html>
